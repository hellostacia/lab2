{% extends 'base.html' %}
{% block content %}
<h1>Cookie</h1>
<p class="text-muted">Если cookie не было, приложение установит демонстрационную cookie. Обновите страницу.</p>
<table class="table table-bordered">
    <tr><th>Cookie</th><th>Значение</th></tr>
    {% for key, value in cookies.items() %}<tr><td>{{ key }}</td><td>{{ value }}</td></tr>{% endfor %}
</table>
{% endblock %}
